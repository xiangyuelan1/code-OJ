services:
  oj:
    build: .
    container_name: oj-system
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - oj-data:/app/prisma
      - oj-uploads:/app/uploads
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=oj-prod-secret-key-2026-change-me
      - JWT_EXPIRES_IN=24h
      - NODE_ENV=production
      - PORT=5000

volumes:
  oj-data:
  oj-uploads:
